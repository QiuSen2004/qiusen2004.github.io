<!DOCTYPE HTML>

        <meta http-equiv="X-UA-Compatible" content="ie=edge"><!--网页在ie上观看时,按照浏览器的最高版本的IE观看-->
        <meta charset="utf-8"> <!--编码-->

            *{

            }
            .father{width:100%;}
            .element{width:25%;height:0;padding-bottom:35%;background:#81c2fc;}

            .main{overflow:hidden；}

                @media screen and (min-width: 1201px) {
                .main {width: 60vw;margin: 0 0 20vw 20vw;}
                 }

                @media screen and (max-width: 1200px) {
                .main {width: 70vw;margin: 0 0 15vw 15vw;} 
                }
                /* 设置了浏览器宽度不大于1200px时 main 显示900px宽度 */
                @media screen and (max-width: 900px) {
                .main {width: 90vw;margin: 0 0 5vw 5vw;} 
                }
                /* 设置了浏览器宽度不大于900px时 main 显示200px宽度 */
                @media screen and (max-width: 500px) {
                .main {width: 100vw;margin: 0;} 
                }
                /* 设置了浏览器宽度不大于500px时 main 显示100px宽度 */
        
        </style>
